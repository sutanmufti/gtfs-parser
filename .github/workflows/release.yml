name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        run: |
          GOOS=linux   GOARCH=amd64 go build -o gtfs-cli       ./cli/
          GOOS=linux   GOARCH=arm64 go build -o gtfs-cli       ./cli/
          GOOS=darwin  GOARCH=amd64 go build -o gtfs-cli     ./cli/
          GOOS=darwin  GOARCH=arm64 go build -o gtfs-cli     ./cli/
          GOOS=windows GOARCH=amd64 go build -o gtfs-cli.exe ./cli/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: gtfs-c*
